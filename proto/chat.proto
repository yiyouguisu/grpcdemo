syntax = "proto3";

package proto;
option go_package = "./chat";

// NOTE: RequstMessage is a known typo from the original proto generation.
// To fix, install protoc and run `make proto` after correcting the name below.
message RequstMessage {
    string body = 1;
}

message ResponseMessage {
    string body = 1;
}

service ChatService {
    rpc SayHello (RequstMessage) returns (ResponseMessage){};
}